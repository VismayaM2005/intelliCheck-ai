name: IntelliCheck AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Test with pytest
      run: |
        python -m pytest tests/ --cov=./
        
    - name: Build Docker image
      run: docker build . --file Dockerfile --tag intellicheck-ai:latest

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Dummy Deploy Step (Simulation)
      run: |
        echo "Simulating auto deployment to Streamlit community cloud or Cloud Run..."
        echo "Docker image packaging and deployment successful!"
